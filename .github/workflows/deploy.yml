name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      preview-url: ${{ steps.preview.outputs.url }}
      status: ${{ job.status }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: client/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: client
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment variables
        working-directory: client
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project
        working-directory: client
        run: npm run build
        env:
          CI: false
          VITE_HOLIDAY_API_KEY: ${{ secrets.VITE_HOLIDAY_API_KEY }}
          VITE_KMA_SERVICE_KEY: ${{ secrets.VITE_KMA_SERVICE_KEY }}
          VITE_ENV: ${{ secrets.VITE_ENV }}
          VITE_API_ORIGIN: ${{ secrets.VITE_API_ORIGIN }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Prepare Vercel output
        run: |
          mkdir -p .vercel/output/static
          cp -r client/dist/. .vercel/output/static/
          echo '{"version":3,"routes":[{"src":"/(.*?)(\\.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|map))$","dest":"/$1$2"},{"src":"/(.*)","dest":"/index.html"}]}' > .vercel/output/config.json

      - name: Deploy to Vercel (Production)
        if: github.event_name == 'push'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request'
        id: preview
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  storybook:
    runs-on: ubuntu-latest
    outputs:
      preview-url: ${{ steps.storybook-preview.outputs.url }}
      status: ${{ job.status }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: client/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: client
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Build Storybook
        working-directory: client
        run: npm run build-storybook
        env:
          CI: false

      - name: Prepare Storybook Vercel output
        run: |
          mkdir -p .vercel/output/static
          cp -r client/storybook-static/. .vercel/output/static/
          echo '{"version":3,"routes":[{"src":"/(.*)","dest":"/$1"}]}' > .vercel/output/config.json

      - name: Deploy Storybook to Vercel (Production)
        if: github.event_name == 'push'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_STORYBOOK_PROJECT_ID }}

      - name: Deploy Storybook to Vercel (Preview)
        if: github.event_name == 'pull_request'
        id: storybook-preview
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_STORYBOOK_PROJECT_ID }}

  comment:
    runs-on: ubuntu-latest
    needs: [deploy, storybook]
    if: github.event_name == 'pull_request' && always() # ← 실패해도 코멘트 달리게
    permissions:
      pull-requests: write

    steps:
      - name: Comment Preview URLs on PR
        uses: actions/github-script@v7
        with:
          script: |
            const deployStatus = '${{ needs.deploy.result }}' === 'success' ? '🟢 Ready' : '🔴 Error';
            const storybookStatus = '${{ needs.storybook.result }}' === 'success' ? '🟢 Ready' : '🔴 Error';
            const deployUrl = '${{ needs.deploy.outputs.preview-url }}' || '-';
            const storybookUrl = '${{ needs.storybook.outputs.preview-url }}' || '-';
            const deployPreview = deployUrl !== '-' ? `<a href="${deployUrl}" target="_blank">Visit Preview</a>` : '-';
            const storybookPreview = storybookUrl !== '-' ? `<a href="${storybookUrl}" target="_blank">Visit Preview</a>` : '-';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `The latest updates on your projects.\n\n| Project | Deployment | Preview | Updated (UTC) |\n|---|---|---|---|\n| **groupware** | ${deployStatus} | ${deployPreview} | ${new Date().toUTCString()} |\n| **storybook** | ${storybookStatus} | ${storybookPreview} | ${new Date().toUTCString()} |`
            })
